<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ОГЭ, задание 1 — Химические элементы и вещества</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script src="js/theme.js"></script>
    <script src="js/oge-check-feedback.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1>ОГЭ</h1>
        <div class="site-header__tail">
          <nav>
            <a href="index.html">Главная</a>
            <a href="topics.html">Темы</a>
            <a href="tables.html">Таблицы</a>
            <a href="oge.html">ОГЭ</a>
          </nav>
          <button
            type="button"
            class="theme-toggle"
            aria-label="Включить светлую тему"
          >
            <span class="material-symbols-outlined" aria-hidden="true"
              >light_mode</span
            >
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <article class="card">
        <p><a href="oge.html">← К списку заданий ОГЭ</a></p>
        <nav class="oge-task-nav" aria-label="Соседние задания ОГЭ">
          <a class="oge-task-nav__next" href="oge-02.html"
            >К следующему типу (задание 2) →</a
          >
        </nav>
        <h2>Задание 1</h2>
        <p class="lead">Химические элементы и вещества</p>

        <p>
          Выберите два утверждения, в которых говорится о фосфоре как о
          <strong>химическом элементе</strong>.
        </p>

        <ol class="oge-statements">
          <li>
            <label>
              <input type="checkbox" name="st" value="1" />
              <span>Белый фосфор способен светиться в темноте.</span>
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" name="st" value="2" />
              <span
                >В свободном состоянии фосфор не встречается в природе из-за
                высокой химической активности.</span
              >
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" name="st" value="3" />
              <span
                >Основными источниками фосфора для человека являются молочные
                продукты, мясо и бобовые культуры.</span
              >
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" name="st" value="4" />
              <span
                >Фосфор при нагревании реагирует со многими неметаллами.</span
              >
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" name="st" value="5" />
              <span>Фосфор входит в состав многих минералов.</span>
            </label>
          </li>
        </ol>

        <p>Запишите номера выбранных ответов.</p>
        <p class="oge-answer-label">Ответ:</p>
        <div class="oge-answer-cells" role="group" aria-label="Две цифры">
          <input
            id="c1"
            type="text"
            inputmode="numeric"
            maxlength="1"
            autocomplete="off"
            aria-label="Первая ячейка ответа"
          />
          <input
            id="c2"
            type="text"
            inputmode="numeric"
            maxlength="1"
            autocomplete="off"
            aria-label="Вторая ячейка ответа"
          />
        </div>
        <p style="margin-top: 16px">
          <button type="button" id="checkBtn">Проверить</button>
        </p>
        <p id="resultOut" class="result" role="status"></p>
      </article>
    </main>

    <script>
      (function () {
        const correct = ["3", "5"];
        OGE_eachTwoChoiceScope(correct, 5, function (root, pair, optionCount) {
          const boxes = root.querySelectorAll(
            '.oge-statements input[type="checkbox"]',
          );
          const btn = root.querySelector("button[type='button']");
          const out = root.querySelector(".result");
          const inputs = root.querySelectorAll(
            ".oge-answer-cells input[type='text']",
          );
          if (!btn || !out || inputs.length < 2) return;
          btn.addEventListener("click", function () {
            const chosen = [];
            boxes.forEach(function (cb) {
              if (cb.checked) chosen.push(cb.value);
            });
            const ok = OGE_twoChoiceAllOk(
              chosen,
              inputs[0].value.trim(),
              inputs[1].value.trim(),
              pair,
              optionCount,
            );
            out.textContent = ok ? OGE_CHECK.ok : OGE_CHECK.retry;
          });
        });
      })();
    </script>
  </body>
</html>
