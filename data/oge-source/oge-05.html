<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ОГЭ, задание 5 — Типы химической связи</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script src="js/theme.js"></script>
    <script src="js/oge-check-feedback.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1>ОГЭ</h1>
        <div class="site-header__tail">
          <nav>
            <a href="index.html">Главная</a>
            <a href="topics.html">Темы</a>
            <a href="tables.html">Таблицы</a>
            <a href="oge.html">ОГЭ</a>
          </nav>
          <button
            type="button"
            class="theme-toggle"
            aria-label="Включить светлую тему"
          >
            <span class="material-symbols-outlined" aria-hidden="true"
              >light_mode</span
            >
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <article class="card">
        <p><a href="oge.html">← К списку заданий ОГЭ</a></p>
        <nav class="oge-task-nav" aria-label="Соседние задания ОГЭ">
          <a href="oge-04.html">← К предыдущему типу (задание 4)</a>
          <a class="oge-task-nav__next" href="oge-06.html"
            >К следующему типу (задание 6) →</a
          >
        </nav>
        <h2>Задание 5</h2>
        <p class="lead">Типы химической связи</p>

        <p>
          Из предложенного перечня выберите
          <strong>два вещества с ионной связью</strong>.
        </p>
        <ol class="oge-statements">
          <li>
            <label
              ><input type="checkbox" name="st" value="1" />
              <span>NaF</span></label
            >
          </li>
          <li>
            <label
              ><input type="checkbox" name="st" value="2" />
              <span>CaO</span></label
            >
          </li>
          <li>
            <label
              ><input type="checkbox" name="st" value="3" />
              <span>NH<sub>3</sub></span></label
            >
          </li>
          <li>
            <label
              ><input type="checkbox" name="st" value="4" />
              <span>HBr</span></label
            >
          </li>
          <li>
            <label
              ><input type="checkbox" name="st" value="5" />
              <span>CO<sub>2</sub></span></label
            >
          </li>
        </ol>
        <p>Запишите номера выбранных ответов.</p>
        <p class="oge-answer-label">Ответ:</p>
        <div class="oge-answer-cells" role="group" aria-label="Две цифры">
          <input
            id="c1"
            type="text"
            inputmode="numeric"
            maxlength="1"
            autocomplete="off"
          />
          <input
            id="c2"
            type="text"
            inputmode="numeric"
            maxlength="1"
            autocomplete="off"
          />
        </div>
        <p style="margin-top: 16px">
          <button type="button" id="checkBtn">Проверить</button>
        </p>
        <p id="resultOut" class="result" role="status"></p>
      </article>
    </main>

    <script>
      (function () {
        const correct = ["1", "2"];
        const boxes = document.querySelectorAll(
          '.oge-statements input[type="checkbox"]',
        );
        function limit() {
          let n = 0;
          boxes.forEach(function (b) {
            if (b.checked) n++;
          });
          const L = n >= 2;
          boxes.forEach(function (b) {
            b.disabled = L && !b.checked;
          });
        }
        boxes.forEach(function (b) {
          b.addEventListener("change", limit);
        });
        limit();

        document
          .getElementById("checkBtn")
          .addEventListener("click", function () {
            const a = document.getElementById("c1").value.trim();
            const b = document.getElementById("c2").value.trim();
            const out = document.getElementById("resultOut");
            const chosen = [];
            boxes.forEach(function (x) {
              if (x.checked) chosen.push(x.value);
            });
            const ok = OGE_twoChoiceAllOk(chosen, a, b, correct, 5);
            out.textContent = ok ? OGE_CHECK.ok : OGE_CHECK.retry;
          });
      })();
    </script>
  </body>
</html>
