<p><a href="index.html">← К списку заданий ОГЭ</a></p>

        <h2>Задание 1</h2>
        <p class="lead">Химические элементы и вещества</p>
      <h3 class="oge-example-title" id="oge-ex-title-1001"><a class="oge-task-seq" href="ex/1001.html">Задание 1 № 1001</a></h3>
      <div class="oge-subtask" id="oge-ex-1001">
        <p>
                  Выберите два утверждения, в которых говорится об азоте как о
                  <strong>простом веществе</strong>.
                </p>

                <ol class="oge-statements">
                  <li>
                    <label>
                      <input type="checkbox" name="st" value="1" />
                      <span
                        >Азот необходим растениям для образования хлорофилла и других
                        органических веществ.</span
                      >
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox" name="st" value="2" />
                      <span
                        >Азот в промышленности получают фракционной перегонкой жидкого
                        воздуха.</span
                      >
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox" name="st" value="3" />
                      <span
                        >В жидком состоянии азот бесцветен и подвижен, как вода.</span
                      >
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox" name="st" value="4" />
                      <span
                        >Содержание азота в почвах колеблется от 0,07 до
                        0,5&nbsp;%.</span
                      >
                    </label>
                  </li>
                  <li>
                    <label>
                      <input type="checkbox" name="st" value="5" />
                      <span>Валентность азота в ионе аммония равна IV.</span>
                    </label>
                  </li>
                </ol>

                <p>Запишите номера выбранных ответов.</p>

                <p class="oge-answer-label">Ответ:</p>
                <div
                  class="oge-answer-cells"
                  role="group"
                  aria-label="Номера двух выбранных утверждений (порядок цифр в ячейках любой)"
                >
                  <input
                    id="ansDigit1"
                    type="text"
                    inputmode="numeric"
                    maxlength="1"
                    aria-label="Первая ячейка ответа"
                    autocomplete="off"
                  />
                  <input
                    id="ansDigit2"
                    type="text"
                    inputmode="numeric"
                    maxlength="1"
                    aria-label="Вторая ячейка ответа"
                    autocomplete="off"
                  />
                </div>

                <p style="margin-top: 16px">
                  <button type="button" id="checkTask1">Проверить</button>
                </p>
                <p id="resultTask1" class="result" role="status"></p>
      </div>
    </article>
    </main>

    <script>
      (function () {
        const correct = ["2", "3"];
        const btn = document.getElementById("checkTask1");
        const out = document.getElementById("resultTask1");
        const boxes = document.querySelectorAll(
          '.oge-statements input[type="checkbox"]',
        );
        const d1 = document.getElementById("ansDigit1");
        const d2 = document.getElementById("ansDigit2");

        function updateCheckboxLimit() {
          let n = 0;
          boxes.forEach(function (cb) {
            if (cb.checked) n += 1;
          });
          const limit = n >= 2;
          boxes.forEach(function (cb) {
            cb.disabled = limit && !cb.checked;
          });
        }

        boxes.forEach(function (cb) {
          cb.addEventListener("change", updateCheckboxLimit);
        });
        updateCheckboxLimit();

        btn.addEventListener("click", function () {
          const chosen = [];
          boxes.forEach(function (cb) {
            if (cb.checked) chosen.push(cb.value);
          });
          const ok = OGE_twoChoiceAllOk(
            chosen,
            d1.value,
            d2.value,
            correct,
            5,
          );
          out.textContent = ok ? OGE_CHECK.ok : OGE_CHECK.retry;
        });
      })();
    </script>
  </body>
